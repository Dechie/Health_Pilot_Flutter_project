name: healthpilot
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.7
  line_icons: ^2.0.3
  font_awesome_flutter: ^10.6.0
  smooth_page_indicator: ^1.1.0
  intl_mobile_field: ^2.1.4
  dropdown_textfield: ^1.0.8

  shared_preferences: ^2.2.1
  step_progress_indicator: ^1.0.2
  rulers: ^1.0.7
  flutter_ruler_picker: ^1.0.6

  cupertino_icons: ^1.0.9
  flutter_markdown_plus: ^1.0.7
  readmore: ^3.0.0
  provider: ^6.1.5+1

  bubble: ^1.2.1
  google_fonts: ^6.3.0

  flutter_screenutil: ^5.9.0
  feather_icons: ^1.2.0
  grouped_list: ^5.1.2
  flutter_chat_bubble: ^2.0.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Transitive (path_provider_windows / shared_preferences_windows); 5.1.0 breaks on Dart 3.11+.
dependency_overrides:
  win32: ^5.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/Icons/
    - assets/PrivacyPolicy/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          style: normal
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Regular.ttf
          style: normal
